<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0a0a0b" />
    <script>
      (function () {
        try {
          var k = 'pantheon-theme-preference';
          var t = localStorage.getItem(k);
          var resolved;
          if (t === 'light') resolved = 'light';
          else if (t === 'dark') resolved = 'dark';
          else if (t === 'system')
            resolved = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
          else resolved = 'dark';
          document.documentElement.setAttribute('data-theme', resolved);
          if (t) document.documentElement.setAttribute('data-theme-preference', t);
        } catch (e) {}
      })();
    </script>
    <script>
      (function () {
        try {
          var k = 'pantheon-locale';
          var v = localStorage.getItem(k);
          var lang =
            v === 'ru' || v === 'en'
              ? v
              : navigator.language && navigator.language.toLowerCase().indexOf('ru') === 0
                ? 'ru'
                : 'en';
          document.documentElement.lang = lang === 'ru' ? 'ru' : 'en';
        } catch (e) {}
      })();
    </script>
    <link rel="icon" type="image/svg+xml" href="/src/assets/logo.svg" />
    <title>Pantheon</title>
  </head>

  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>

    <script src="/src/index.tsx" type="module"></script>
  </body>
</html>
